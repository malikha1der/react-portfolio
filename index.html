<!doctype html>
<html lang="en">

<head>

    <!-- Basic -->

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <meta
        name="theme-color"
        content="#050505"
    />

    <!-- SEO -->

    <title>Malik | Frontend React Developer Portfolio</title>

    <meta
        name="description"
        content="Professional portfolio of Malik, a Frontend React Developer and Computer Science Student specializing in React.js, JavaScript, responsive web design and modern user interfaces."
    />

    <meta
        name="keywords"
        content="Malik, Frontend Developer, React Developer, React.js, JavaScript, HTML, CSS, Tailwind CSS, Portfolio"
    />

    <meta
        name="author"
        content="Malik"
    />

    <!-- Open Graph -->

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Malik | Frontend React Developer" />
    <meta property="og:description" content="Explore my portfolio showcasing React projects and modern UI design." />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://your-domain.com" />

    <!-- Twitter -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Malik | Frontend React Developer" />
    <meta name="twitter:description" content="Frontend React Developer Portfolio." />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Single Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="/favicon-512x512.png"
    />

    <link
        rel="apple-touch-icon"
        href="/favicon-512x512.png"
    />

    <!-- Canonical -->

    <link
        rel="canonical"
        href="https://your-domain.com"
    />

</head>

<body>

    <div id="root"></div>

    <script
        type="module"
        src="/src/main.jsx"
    ></script>

</body>

</html>
